<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button color="light"></ion-menu-button>
    </ion-buttons>
    <ion-title>Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--background:#F4F4F4;">

  <div style="background:#CC1E1E; padding:32px 20px 60px; text-align:center;">
    <div style="width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.2); border:3px solid #ffffff; display:flex; align-items:center; justify-content:center; margin:0 auto 12px;">
      <ion-icon name="person-outline" style="font-size:36px; color:#ffffff;"></ion-icon>
    </div>
    <h2 style="color:#ffffff; font-size:20px; font-weight:700; margin:0 0 4px;">
      {{ currentUser?.name ?? 'Usuario' }}
    </h2>
    <p style="color:rgba(255,255,255,0.8); font-size:13px; margin:0;">
      {{ currentUser?.email }}
    </p>
  </div>

  <div style="padding:0 16px; margin-top:-32px;">

    <div style="background:#ffffff; border-radius:16px; box-shadow:0 4px 16px rgba(0,0,0,0.1); overflow:hidden; margin-bottom:16px;">

      <div style="padding:16px; border-bottom:0.5px solid #F0F0F0; display:flex; align-items:center; gap:14px;">
        <div style="width:38px; height:38px; border-radius:10px; background:#FFEBEE; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <ion-icon name="mail-outline" style="font-size:18px; color:#CC1E1E;"></ion-icon>
        </div>
        <div>
          <p style="font-size:11px; color:#6B6B6B; margin:0;">Correo electrónico</p>
          <p style="font-size:14px; font-weight:500; color:#1A1A1A; margin:2px 0 0;">{{ currentUser?.email ?? '—' }}</p>
        </div>
      </div>

      <div style="padding:16px; display:flex; align-items:center; gap:14px;">
        <div style="width:38px; height:38px; border-radius:10px; background:#E8F5E9; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <ion-icon name="shield-checkmark-outline" style="font-size:18px; color:#1A7A2E;"></ion-icon>
        </div>
        <div>
          <p style="font-size:11px; color:#6B6B6B; margin:0;">Rol</p>
          <p style="font-size:14px; font-weight:500; color:#1A1A1A; margin:2px 0 0;">{{ currentUser?.role === 'admin' ? 'Administrador' : 'Pasajero' }}</p>
        </div>
      </div>

    </div>

    <p style="text-align:center; font-size:12px; color:#AAAAAA; margin-top:24px;">Rápido Ochoa App v1.0.0</p>

  </div>

</ion-content>
