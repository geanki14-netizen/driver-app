<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h2>Bienvenido{{ currentUser ? ', ' + currentUser.name : '' }}</h2>

  <p *ngIf="currentUser">
    Correo: {{ currentUser.email }}<br>
    Rol: {{ currentUser.role }}
  </p>

  <ion-button expand="block" color="danger" (click)="logout()">
    Cerrar sesión
  </ion-button>
</ion-content>
