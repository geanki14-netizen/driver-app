<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <h2>Bienvenido{{ currentUser ? ', ' + currentUser.name : '' }}</h2>

  <p *ngIf="currentUser">
    Correo: {{ currentUser.email }}<br>
    Rol: {{ currentUser.role }}
  </p>

  <ion-button expand="block" color="danger" (click)="logout()">
    Cerrar sesión
  </ion-button>

  <h3 class="ion-margin-top">Items desde la API</h3>

  <ion-spinner *ngIf="loading && items.length === 0" name="crescent"></ion-spinner>

  <ion-list *ngIf="items.length > 0">
    <ion-item *ngFor="let item of items">
      <ion-label>
        <h2>{{ item.title }}</h2>
        <p>{{ item.description }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-infinite-scroll (ionInfinite)="onInfiniteScroll($event)">
    <ion-infinite-scroll-content
      loadingText="Cargando más..."
      loadingSpinner="crescent">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
