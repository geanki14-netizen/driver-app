<ion-content [fullscreen]="true" style="--background: #CC1E1E;">

  <div style="height:100%; display:flex; flex-direction:column;
              align-items:center; justify-content:center; gap:16px;">

    <!-- Logo -->
    <img src="assets/logo-rapido-ochoa.png"
         alt="Rápido Ochoa"
         style="width:160px;"
         onerror="this.style.display='none'">

    <!-- Nombre -->
    <div style="text-align:center;">
      <h1 style="color:#ffffff; font-size:28px; font-weight:700;
                 margin:0; letter-spacing:1px;">
        RÁPIDO OCHOA
      </h1>
      <p style="color:rgba(255,255,255,0.8); font-size:14px; margin:4px 0 0;">
        Transportamos tus ilusiones
      </p>
    </div>

    <!-- Línea decorativa verde -->
    <div style="width:60px; height:3px; background:#1A7A2E;
                border-radius:99px; margin:8px 0;"></div>

    <!-- Spinner -->
    <ion-spinner name="crescent"
      style="--color:#ffffff; width:32px; height:32px; margin-top:16px;">
    </ion-spinner>

  </div>

</ion-content>
